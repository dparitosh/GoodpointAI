[pytest]
# Silence pytest-asyncio deprecation by explicitly setting fixture loop scope.
asyncio_default_fixture_loop_scope = function

# This repository contains a second backend snapshot under `agentic-restored/`.
# Running pytest from the repo root would otherwise collect duplicate test module
# names (e.g. `tests.test_*`) from both trees, causing import-file-mismatch errors.
testpaths =
	../agentic-restored/python_backend/tests

# Extra safety: never recurse into the restored bundle from this legacy tree.
norecursedirs =
	../agentic-restored
