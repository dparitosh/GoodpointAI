# GraphTrace Apache HTTPD sample config
# - Serves the built frontend from e2etraceapp/dist
# - Proxies /api to the backend (uvicorn)
#
# Enable required modules (names vary by distribution):
#   LoadModule proxy_module modules/mod_proxy.so
#   LoadModule proxy_http_module modules/mod_proxy_http.so
#   LoadModule headers_module modules/mod_headers.so
#   LoadModule rewrite_module modules/mod_rewrite.so
#
# Adjust paths/ports for your environment.

Listen 8080

<VirtualHost *:8080>
    ServerName localhost

    # Frontend build output
    DocumentRoot "${SRVROOT}/graphtrace/e2etraceapp/dist"

    <Directory "${SRVROOT}/graphtrace/e2etraceapp/dist">
        Options Indexes FollowSymLinks
        AllowOverride None
        Require all granted

        # SPA routing: send unknown paths to index.html
        RewriteEngine On
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteCond %{REQUEST_FILENAME} !-d
        RewriteRule ^ /index.html [L]
    </Directory>

    # Proxy backend API
    ProxyPreserveHost On
    ProxyPass        /api http://127.0.0.1:8000/api
    ProxyPassReverse /api http://127.0.0.1:8000/api

    # Hardening (basic)
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "SAMEORIGIN"
</VirtualHost>
