[pytest]
# This repository contains two backend trees:
# - python_backend/
# - agentic-restored/python_backend/
#
# Both trees include a tests/ package with the same module names (tests.test_*),
# which causes pytest "import file mismatch" errors if both are collected.
#
# We intentionally scope test discovery to the restored backend tree.
testpaths =
    agentic-restored/python_backend/tests

norecursedirs =
    python_backend

asyncio_default_fixture_loop_scope = function
